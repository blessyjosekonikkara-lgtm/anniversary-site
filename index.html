<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #e2e8f0;
    overflow-x: hidden;
  }

  /* 🎥 BACKGROUND VIDEO (works for both portrait & landscape) */
  .bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.55);
    z-index: -1;
  }

  .topbar {
    background: rgba(17,24,39,0.9);
    padding: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: #f472b6;
  }

  .container {
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
  }

  .card {
    background: rgba(30,41,59,0.85);
    padding: 20px;
    border-radius: 12px;
    backdrop-filter: blur(6px);
  }

  h1, h2 {
    color: #f472b6;
  }

  .quote {
    font-style: italic;
    color: #cbd5e1;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
  }

  .grid img {
    width: 100%;
    border-radius: 10px;
  }

  .footer {
    text-align: center;
    padding: 15px;
    background: rgba(17,24,39,0.9);
    font-size: 14px;
    color: #94a3b8;
  }

  .tag {
    display: inline-block;
    background: #334155;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    margin-top: 10px;
  }

  /* 💻 HORIZONTAL / DESKTOP MODE */
  @media (min-width: 768px) {
    .container {
      grid-template-columns: 1fr 1fr;
    }

    .card:nth-child(1) {
      grid-column: span 2;
    }

    .card:nth-child(2) {
      grid-column: span 1;
    }

    .card:nth-child(3) {
      grid-column: span 1;
    }

    .card:nth-child(4) {
      grid-column: span 2;
    }
  }
</style>
